name: Appium + Robot Framework - BrowserStack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Upload do APK para a BrowserStack
        run: |
          response=$(curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@app/Food_Diary.apk")
          echo "Resposta: $response"
          app_url=$(echo "$response" | jq -r '.app_url')
          if [ "$app_url" = "null" ] || [ -z "$app_url" ]; then
            echo "Falha ao subir o app na BrowserStack"; exit 1
          fi
          echo "BROWSERSTACK_APP_URL=$app_url" >> "$GITHUB_ENV"

      - name: Instalar Allure Commandline
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -o allure.zip -Ls https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
          unzip -q allure.zip -d $HOME
          echo "$HOME/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Baixar histórico anterior do Allure
        continue-on-error: true
        run: |
          git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }}.git gh-pages-clone
          mkdir -p allure-results/history
          cp -r gh-pages-clone/history/* allure-results/history/ 2>/dev/null || true

      - name: Rodar testes Robot Framework na BrowserStack
        id: run_tests
        continue-on-error: true
        run: |
          robot \
            --listener allure_robotframework:./allure-results \
            --variable USE_BROWSERSTACK:true \
            --variable BROWSERSTACK_APP_URL:"$BROWSERSTACK_APP_URL" \
            --variable BROWSERSTACK_USERNAME:"$BROWSERSTACK_USERNAME" \
            --variable BROWSERSTACK_ACCESS_KEY:"$BROWSERSTACK_ACCESS_KEY" \
            --variable BUILD_NUMBER:"$GITHUB_RUN_NUMBER" \
            --outputdir results \
            tests/

      - name: Criar executor, categorias e ambiente para o Allure
        if: always()
        run: |
          cp categories.json allure-results/categories.json

          cat > allure-results/executor.json << EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "Build ${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          }
          EOF

          cat > allure-results/environment.properties << EOF
          Platform=Android
          Device=Google Pixel 7
          Execution=BrowserStack App Automate
          Build=${{ github.run_number }}
          Branch=${{ github.ref_name }}
          EOF

      - name: Gerar relatório Allure
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publicar relatório Allure no GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          keep_files: false